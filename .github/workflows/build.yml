name: Build Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Prepare assets
        run: |
          mkdir -p pkg-assets/public pkg-assets/data
          cp -r public/* pkg-assets/public/ 2>/dev/null || xcopy /E /I public pkg-assets\public
          cp -r data/* pkg-assets/data/ 2>/dev/null || xcopy /E /I data pkg-assets\data 2>nul

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pkg server.js --targets node18-win --output app.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            pkg server.js --targets node18-macos --output app
            chmod +x app
          else
            pkg server.js --targets node18-linux --output app
            chmod +x app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: app
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup GitHub CLI
        run: gh auth login --token ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 \
            --repo MasterPick/md-preview \
            --title "Build v1.0.0" \
            --draft \
            --notes "Cross-platform binary builds for md-preview v1.0.0"

      - name: Upload Linux binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 artifacts/app-ubuntu-latest/app \
            --repo MasterPick/md-preview --clobber || true

      - name: Upload Windows binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 artifacts/app-windows-latest/app.exe \
            --repo MasterPick/md-preview --clobber || true

      - name: Upload macOS binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 artifacts/app-macos-latest/app \
            --repo MasterPick/md-preview --clobber || true
