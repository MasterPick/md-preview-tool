<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Preview Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #181825;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #313244;
    }
    header h1 { font-size: 1.1rem; color: #cba6f7; }
    header span { font-size: 0.8rem; color: #6c7086; }
    .toolbar {
      background: #181825;
      padding: 8px 24px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #313244;
    }
    .toolbar button {
      background: #313244;
      color: #cdd6f4;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
    }
    .toolbar button:hover { background: #45475a; }
    .toolbar button.active { background: #cba6f7; color: #1e1e2e; }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-label {
      background: #181825;
      padding: 6px 16px;
      font-size: 0.75rem;
      color: #6c7086;
      border-bottom: 1px solid #313244;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #editor {
      flex: 1;
      background: #1e1e2e;
      color: #cdd6f4;
      border: none;
      outline: none;
      padding: 20px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      resize: none;
      border-right: 1px solid #313244;
    }
    #preview {
      flex: 1;
      padding: 20px 28px;
      overflow-y: auto;
      background: #1e1e2e;
      line-height: 1.8;
    }
    #preview h1, #preview h2, #preview h3 { color: #cba6f7; margin: 1em 0 0.5em; }
    #preview h1 { font-size: 1.8rem; border-bottom: 2px solid #313244; padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.4rem; border-bottom: 1px solid #313244; padding-bottom: 0.2em; }
    #preview p { margin: 0.6em 0; }
    #preview code {
      background: #313244;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.88em;
      color: #a6e3a1;
    }
    #preview pre {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #preview pre code { background: none; padding: 0; color: #a6e3a1; }
    #preview blockquote {
      border-left: 4px solid #cba6f7;
      padding-left: 16px;
      color: #a6adc8;
      margin: 1em 0;
    }
    #preview a { color: #89b4fa; }
    #preview ul, #preview ol { padding-left: 1.5em; margin: 0.5em 0; }
    #preview li { margin: 0.3em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #preview th, #preview td { border: 1px solid #313244; padding: 8px 12px; }
    #preview th { background: #181825; color: #cba6f7; }
    #preview tr:nth-child(even) { background: #181825; }
    #preview img { max-width: 100%; border-radius: 6px; }
    #preview hr { border: none; border-top: 1px solid #313244; margin: 1.5em 0; }
    .divider {
      width: 4px;
      background: #313244;
      cursor: col-resize;
      transition: background 0.2s;
    }
    .divider:hover { background: #cba6f7; }
    .stats {
      background: #181825;
      padding: 4px 16px;
      font-size: 0.72rem;
      color: #6c7086;
      border-top: 1px solid #313244;
      display: flex;
      gap: 16px;
    }
    .copy-btn {
      margin-left: auto;
      background: #313244;
      color: #cdd6f4;
      border: none;
      padding: 2px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.72rem;
    }
    .copy-btn:hover { background: #45475a; }
  </style>
</head>
<body>
  <header>
    <h1>📝 Markdown Preview Tool</h1>
    <span>实时 Markdown 预览编辑器</span>
  </header>
  <div class="toolbar">
    <button onclick="insertMd('**粗体**')" title="Bold">B</button>
    <button onclick="insertMd('*斜体*')" title="Italic"><em>I</em></button>
    <button onclick="insertMd('# 标题\n')" title="Heading">H1</button>
    <button onclick="insertMd('## 标题\n')" title="Heading 2">H2</button>
    <button onclick="insertMd('`代码`')" title="Inline Code">&lt;/&gt;</button>
    <button onclick="insertMd('\n```\n代码块\n```\n')" title="Code Block">```</button>
    <button onclick="insertMd('[链接文字](https://example.com)')" title="Link">🔗</button>
    <button onclick="insertMd('> 引用内容\n')" title="Blockquote">❝</button>
    <button onclick="insertMd('- 列表项\n')" title="List">• List</button>
    <button onclick="insertMd('---\n')" title="HR">—</button>
    <button onclick="loadSample()" title="Load Sample">示例</button>
    <button onclick="clearEditor()" title="Clear">清空</button>
  </div>
  <div class="container">
    <div class="pane">
      <div class="pane-label">✏️ Markdown 编辑器</div>
      <textarea id="editor" placeholder="在此输入 Markdown 内容..."></textarea>
    </div>
    <div class="divider" id="divider"></div>
    <div class="pane">
      <div class="pane-label">👁️ HTML 预览</div>
      <div id="preview"></div>
    </div>
  </div>
  <div class="stats">
    <span id="charCount">字符: 0</span>
    <span id="wordCount">单词: 0</span>
    <span id="lineCount">行数: 0</span>
    <button class="copy-btn" onclick="copyHtml()">复制 HTML</button>
    <button class="copy-btn" onclick="exportHtml()">导出 HTML</button>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    marked.setOptions({ breaks: true, gfm: true });

    function render() {
      const md = editor.value;
      preview.innerHTML = marked.parse(md);
      const chars = md.length;
      const words = md.trim() ? md.trim().split(/\s+/).length : 0;
      const lines = md.split('\n').length;
      document.getElementById('charCount').textContent = `字符: ${chars}`;
      document.getElementById('wordCount').textContent = `单词: ${words}`;
      document.getElementById('lineCount').textContent = `行数: ${lines}`;
    }

    editor.addEventListener('input', render);

    function insertMd(text) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + text + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + text.length;
      editor.focus();
      render();
    }

    function clearEditor() {
      if (confirm('确定清空编辑器内容？')) {
        editor.value = '';
        render();
      }
    }

    function copyHtml() {
      navigator.clipboard.writeText(preview.innerHTML).then(() => {
        alert('HTML 已复制到剪贴板！');
      });
    }

    function exportHtml() {
      const full = `<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n<title>Exported</title>\n</head>\n<body>\n${preview.innerHTML}\n</body>\n</html>`;
      const blob = new Blob([full], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'export.html';
      a.click();
    }

    function loadSample() {
      editor.value = `# Markdown Preview Tool\n\n> 一个轻量级的 Markdown 实时预览工具\n\n## 功能特性\n\n- ✅ 实时预览\n- ✅ 语法高亮工具栏\n- ✅ 字符/单词/行数统计\n- ✅ 一键导出 HTML\n- ✅ 暗色主题\n\n## 代码示例\n\n\`\`\`javascript\nconst greet = (name) => {\n  console.log(\`Hello, \${name}!\`);\n};\ngreet('World');\n\`\`\`\n\n## 表格\n\n| 功能 | 状态 | 说明 |\n|------|------|------|\n| 实时渲染 | ✅ | 输入即预览 |\n| 导出 HTML | ✅ | 一键导出 |\n| 暗色主题 | ✅ | 护眼设计 |\n\n---\n\n**开始使用**：在左侧编辑器输入 Markdown，右侧实时预览效果。\n`;
      render();
    }

    // Divider drag
    const divider = document.getElementById('divider');
    let dragging = false;
    divider.addEventListener('mousedown', () => dragging = true);
    document.addEventListener('mouseup', () => dragging = false);
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const container = document.querySelector('.container');
      const rect = container.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const panes = container.querySelectorAll('.pane');
      panes[0].style.flex = 'none';
      panes[0].style.width = pct + '%';
      panes[1].style.flex = '1';
    });

    loadSample();
  </script>
</body>
</html>
