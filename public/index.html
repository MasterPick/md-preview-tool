<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview v3.1</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f6f8fa;--border:#d1d5da;--text:#24292f;
  --accent:#0969da;--toolbar-bg:#f6f8fa;--preview-bg:#ffffff;
}
[data-theme=dark]{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;
  --accent:#58a6ff;--toolbar-bg:#161b22;--preview-bg:#0d1117;
}
[data-theme=dracula]{
  --bg:#282a36;--surface:#383a4a;--border:#44475a;--text:#f8f8f2;
  --accent:#bd93f9;--toolbar-bg:#383a4a;--preview-bg:#282a36;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--toolbar-bg);flex-wrap:wrap}
header h1{font-size:14px;color:var(--accent);white-space:nowrap}
.btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--border)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.spacer{flex:1}
.stats{font-size:11px;color:var(--text);opacity:.6;white-space:nowrap}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer}
input[type="text"]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--toolbar-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tool-btn{background:transparent;border:1px solid transparent;color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px;cursor:pointer;font-family:monospace;font-weight:700;transition:all .1s;min-width:28px;text-align:center}
.tool-btn:hover{background:var(--border);border-color:var(--border)}
.tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Main split */
.split{display:flex;flex:1;min-height:0;overflow:hidden}
.pane{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.pane-header{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--toolbar-bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--text);opacity:.6;text-transform:uppercase;letter-spacing:1px}
.pane-header .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.resize{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative}
.resize:hover,.resize.dragging{background:var(--accent)}
/* Editor */
textarea{width:100%;flex:1;border:none;resize:none;background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:14px;line-height:1.7;padding:16px;outline:none;tab-size:2}
/* Preview */
.preview{flex:1;overflow:auto;padding:20px 32px;background:var(--preview-bg)}
.preview h1,.preview h2,.preview h3,.preview h4,.preview h5,.preview h6{border-bottom:1px solid var(--border);padding-bottom:8px;margin:24px 0 12px}
.preview h1{font-size:2em}.preview h2{font-size:1.5em}.preview h3{font-size:1.25em}
.preview p{line-height:1.8;margin:12px 0}
.preview code{background:var(--surface);padding:2px 6px;border-radius:4px;font-size:.9em;font-family:'SF Mono',monospace}
.preview pre{background:var(--surface);padding:14px;border-radius:8px;overflow-x:auto;margin:16px 0}
.preview pre code{background:none;padding:0}
.preview blockquote{border-left:4px solid var(--accent);margin:16px 0;padding:4px 16px;opacity:.8}
.preview table{border-collapse:collapse;width:100%;margin:16px 0}
.preview th,.preview td{border:1px solid var(--border);padding:8px 12px}
.preview th{background:var(--surface)}
.preview img{max-width:100%;border-radius:8px}
.preview a{color:var(--accent)}
.preview ul,.preview ol{margin:12px 0;padding-left:24px;line-height:1.8}
.preview li{margin:4px 0}
.preview hr{border:none;border-top:1px solid var(--border);margin:24px 0}
/* Mermaid */
.preview .mermaid{background:var(--surface);padding:16px;border-radius:8px;margin:16px 0;text-align:center}
/* KaTeX */
.preview .katex-block{margin:16px 0;text-align:center;overflow-x:auto;padding:8px}
.preview .katex{font-size:1.1em}
/* TOC */
.toc-panel{display:none;width:220px;background:var(--surface);border-left:1px solid var(--border);overflow:auto;flex-shrink:0;padding:12px}
.toc-panel.visible{display:block}
.toc-panel h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.6;margin-bottom:10px}
.toc-item{display:block;padding:4px 8px;border-radius:4px;font-size:12px;color:var(--text);text-decoration:none;margin-bottom:2px;transition:background .1s}
.toc-item:hover{background:var(--border)}
.toc-item.level-2{padding-left:16px;font-size:11px}
.toc-item.level-3{padding-left:28px;font-size:11px}
/* Status */
.status{position:fixed;bottom:12px;right:16px;background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:11px;opacity:.8;z-index:100}
.status.saved{color:var(--accent)}
.status.error{color:#cf222e}
/* Drop zone */
.drop-overlay{position:fixed;inset:0;background:rgba(9,105,218,.15);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:200;font-size:20px;color:var(--accent);pointer-events:none}
.drop-overlay.active{display:flex}
/* Fullscreen */
body.fullscreen-editor .pane:first-child{flex:1!important}
body.fullscreen-editor .pane:nth-child(2){display:none!important}
body.fullscreen-editor .resize{display:none}
body.fullscreen-preview .pane:first-child{display:none!important}
body.fullscreen-preview .pane:nth-child(2){flex:1!important}
body.fullscreen-preview .resize{display:none}
/* Find & Replace */
.find-panel{display:none;padding:8px 12px;background:var(--toolbar-bg);border-bottom:1px solid var(--border);gap:8px;align-items:center;flex-wrap:wrap}
.find-panel.visible{display:flex}
.find-panel input{width:150px}
.find-result{font-size:11px;color:var(--text);opacity:.6}
/* Template Dropdown */
.template-dropdown{position:relative;display:inline-block}
.template-menu{display:none;position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:200px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.template-menu.visible{display:block}
.template-item{display:block;width:100%;padding:8px 12px;text-align:left;background:none;border:none;color:var(--text);font-size:12px;cursor:pointer;font-family:inherit}
.template-item:hover{background:var(--border)}
.template-item strong{display:block;font-size:13px}
.template-item span{display:block;font-size:11px;opacity:.6;margin-top:2px}
/* Scroll sync */
.pane.sync-scroll .preview::-webkit-scrollbar{width:8px}
/* Highlight */
.highlight-match{background:#ffdf5d;color:#000;border-radius:2px}
.highlight-current{background:#ff9500;color:#000}
</style>
</head>
<body>

<header>
  <h1>Markdown Preview</h1>
  <span style="font-size:11px;opacity:.5">v3.1</span>
  <div class="sep"></div>
  <select id="theme-select" title="主题">
    <option value="light">Light</option>
    <option value="dark">Dark</option>
    <option value="dracula">Dracula</option>
  </select>
  <div class="template-dropdown">
    <button class="btn" onclick="toggleTemplateMenu()">📝 模板</button>
    <div class="template-menu" id="template-menu">
      <button class="template-item" onclick="loadTemplate('readme')"><strong>README</strong><span>项目说明文档</span></button>
      <button class="template-item" onclick="loadTemplate('tech-doc')"><strong>技术文档</strong><span>API 文档模板</span></button>
      <button class="template-item" onclick="loadTemplate('blog')"><strong>博客文章</strong><span>Markdown 博客格式</span></button>
      <button class="template-item" onclick="loadTemplate('changelog')"><strong>Changelog</strong><span>版本更新日志</span></button>
      <button class="template-item" onclick="loadTemplate('mermaid')"><strong>Mermaid 图表</strong><span>流程图/时序图示例</span></button>
      <button class="template-item" onclick="loadTemplate('math')"><strong>数学公式</strong><span>KaTeX 公式示例</span></button>
    </div>
  </div>
  <button class="btn" onclick="toggleFindPanel()">🔍 查找</button>
  <div class="sep"></div>
  <button class="btn" onclick="toggleFullscreen('editor')" id="fs-editor-btn">全屏编辑</button>
  <button class="btn" onclick="toggleFullscreen('preview')" id="fs-preview-btn">全屏预览</button>
  <button class="btn" onclick="exitFullscreen()" id="fs-exit-btn" style="display:none">退出全屏</button>
  <div class="sep"></div>
  <button class="btn" onclick="exportHTML()">导出 HTML</button>
  <button class="btn" onclick="exportPDF()">导出 PDF</button>
  <button class="btn" onclick="copyHTML()">复制 HTML</button>
  <div class="sep"></div>
  <button class="btn" id="toc-btn" onclick="toggleTOC()" title="目录">目录</button>
  <div class="spacer"></div>
  <span class="stats" id="stats-bar"></span>
</header>

<div class="find-panel" id="find-panel">
  <input type="text" id="find-input" placeholder="查找...">
  <input type="text" id="replace-input" placeholder="替换...">
  <button class="btn" onclick="findNext()">下一个</button>
  <button class="btn" onclick="findPrev()">上一个</button>
  <button class="btn" onclick="replaceOne()">替换</button>
  <button class="btn" onclick="replaceAll()">全部替换</button>
  <span class="find-result" id="find-result"></span>
  <button class="btn" onclick="toggleFindPanel()">✕</button>
</div>

<div class="toolbar">
  <button class="tool-btn" onclick="insertText('# ')" title="一级标题">H1</button>
  <button class="tool-btn" onclick="insertText('## ')" title="二级标题">H2</button>
  <button class="tool-btn" onclick="insertText('### ')" title="三级标题">H3</button>
  <div class="sep" style="height:16px"></div>
  <button class="tool-btn" onclick="insertBold()" title="粗体 **">B</button>
  <button class="tool-btn" onclick="insertItalic()" title="斜体 *">I</button>
  <button class="tool-btn" onclick="insertInlineCode()" title="行内代码">``</button>
  <div class="sep" style="height:16px"></div>
  <button class="tool-btn" onclick="insertLink()" title="链接">&#128279;</button>
  <button class="tool-btn" onclick="insertImage()" title="图片">&#128247;</button>
  <button class="tool-btn" onclick="insertCodeBlock()" title="代码块">&#60;/&#62;</button>
  <div class="sep" style="height:16px"></div>
  <button class="tool-btn" onclick="insertList()" title="无序列表">&#8226;</button>
  <button class="tool-btn" onclick="insertOrderedList()" title="有序列表">1.</button>
  <button class="tool-btn" onclick="insertTable()" title="表格">&#9638;</button>
  <button class="tool-btn" onclick="insertHR()" title="分隔线">&#9131;</button>
  <div class="sep" style="height:16px"></div>
  <button class="tool-btn" onclick="insertBlockquote()" title="引用">&gt;</button>
  <div class="sep" style="height:16px"></div>
  <button class="tool-btn" onclick="insertMermaid()" title="Mermaid 图表">图表</button>
  <button class="tool-btn" onclick="insertMath()" title="数学公式">公式</button>
  <div class="spacer"></div>
  <span style="font-size:11px;opacity:.4" id="auto-save-indicator">Auto-save: ON</span>
</div>

<div class="split" id="split">
  <div class="pane" id="editor-pane">
    <div class="pane-header"><span class="dot"></span>Editor</div>
    <textarea id="editor" placeholder="# 开始编写 Markdown..." spellcheck="false"></textarea>
  </div>
  <div class="resize" id="resize-handle"></div>
  <div class="pane sync-scroll" id="preview-pane">
    <div class="pane-header"><span class="dot"></span>Preview</div>
    <div class="preview" id="preview"></div>
  </div>
  <div class="toc-panel" id="toc-panel">
    <h4>目录</h4>
    <div id="toc-list"></div>
  </div>
</div>

<div class="drop-overlay" id="drop-overlay">📄 释放以打开 Markdown 文件</div>
<div class="status" id="status"></div>

<!-- Mermaid & KaTeX -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const statsBar = document.getElementById('stats-bar');
const statusEl = document.getElementById('status');
let renderTimer = null;
let autoSaveTimer = null;
let lastRendered = '';
let mermaidInitialized = false;

// ── Mermaid Init ─────────────────────────────────────────────────────────────
function initMermaid() {
  if (typeof mermaid !== 'undefined' && !mermaidInitialized) {
    mermaid.initialize({ 
      startOnLoad: false, 
      theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose'
    });
    mermaidInitialized = true;
  }
}

// ── Render ──────────────────────────────────────────────────────────────────
async function render() {
  const md = editor.value;
  if (!md) { preview.innerHTML = '<p style="opacity:.3;padding:20px">预览区域...</p>'; return; }
  try {
    const r = await fetch('/api/render', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ markdown: md })
    });
    const data = await r.json();
    if (data.success) {
      preview.innerHTML = data.html;
      updateStats(data.stats);
      updateTOC(data.toc);
      lastRendered = md;
      // 渲染 Mermaid 图表
      renderMermaidInPreview();
      // 渲染 KaTeX 公式
      renderKatexInPreview();
    }
  } catch(e) {
    preview.innerHTML = '<pre>' + md.replace(/</g,'&lt;') + '</pre>';
  }
}

function renderMermaidInPreview() {
  initMermaid();
  const mermaidDivs = preview.querySelectorAll('.mermaid');
  mermaidDivs.forEach(async (el, i) => {
    if (el.dataset.rendered) return;
    try {
      const id = 'mermaid-' + i + '-' + Date.now();
      const { svg } = await mermaid.render(id, el.textContent);
      el.innerHTML = svg;
      el.dataset.rendered = 'true';
    } catch(e) {
      el.innerHTML = '<span style="color:#cf222e">Mermaid 语法错误: ' + e.message + '</span>';
    }
  });
}

function renderKatexInPreview() {
  const katexDivs = preview.querySelectorAll('.katex-block');
  katexDivs.forEach(el => {
    if (el.dataset.rendered) return;
    try {
      katex.render(el.dataset.latex, el, { displayMode: true, throwOnError: false });
      el.dataset.rendered = 'true';
    } catch(e) {
      el.innerHTML = '<span style="color:#cf222e">公式错误: ' + e.message + '</span>';
    }
  });
}

function updateStats(stats) {
  statsBar.textContent = `📝 ${stats.words} 字 | ⏱ ${stats.readTime} | ${stats.chars} 字符`;
}

function updateTOC(toc) {
  const list = document.getElementById('toc-list');
  if (!toc || toc.length === 0) { list.innerHTML = '<span style="font-size:11px;opacity:.4">无标题</span>'; return; }
  list.innerHTML = toc.map(h => `<a class="toc-item level-${h.level}" href="#${h.id}">${h.text}</a>`).join('');
  preview.querySelectorAll('h1,h2,h3').forEach((el, i) => {
    if (toc[i]) el.id = toc[i].id;
  });
}

function showStatus(msg, type='saved') {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
  statusEl.style.display = 'block';
  setTimeout(() => statusEl.style.display = 'none', 2500);
}

// ── Debounced render ────────────────────────────────────────────────────────
editor.addEventListener('input', () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 280);
  scheduleAutoSave();
});

// ── Keyboard shortcuts ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'b') { e.preventDefault(); insertBold(); }
    else if (e.key === 'i') { e.preventDefault(); insertItalic(); }
    else if (e.key === 'k') { e.preventDefault(); insertLink(); }
    else if (e.key === 's') { e.preventDefault(); exportHTML(); }
    else if (e.key === 'f') { e.preventDefault(); toggleFindPanel(); }
    else if (e.key === 'h') { e.preventDefault(); toggleFindPanel(); }
    else if (e.key === 'Enter') { e.preventDefault(); render(); }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    insertAtCursor('  ');
  }
  if (e.key === 'Escape') {
    exitFullscreen();
    const fp = document.getElementById('find-panel');
    if (fp.classList.contains('visible')) toggleFindPanel();
    const tm = document.getElementById('template-menu');
    if (tm.classList.contains('visible')) tm.classList.remove('visible');
  }
});

// ── Toolbar insert helpers ─────────────────────────────────────────────────
function insertAtCursor(text) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const before = editor.value.substring(0, start);
  const after = editor.value.substring(end);
  editor.value = before + text + after;
  editor.selectionStart = editor.selectionEnd = start + text.length;
  editor.focus();
  render();
}

function wrapSelection(before, after = before) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const sel = editor.value.substring(start, end);
  const newText = before + (sel || 'text') + after;
  const beforePart = editor.value.substring(0, start);
  const afterPart = editor.value.substring(end);
  editor.value = beforePart + newText + afterPart;
  const newStart = start + before.length;
  const newEnd = newStart + (sel || 'text').length;
  editor.selectionStart = newStart;
  editor.selectionEnd = newEnd;
  editor.focus();
  render();
}

function insertText(text) { insertAtCursor(text); }
function insertBold() { wrapSelection('**'); }
function insertItalic() { wrapSelection('*'); }
function insertInlineCode() { wrapSelection('`'); }

function insertLink() {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const sel = editor.value.substring(start, end) || '链接文本';
  const newText = `[${sel}](url)`;
  editor.value = editor.value.substring(0, start) + newText + editor.value.substring(end);
  editor.selectionStart = start + sel.length + 3;
  editor.selectionEnd = start + sel.length + 6;
  editor.focus();
  render();
}

function insertImage() { insertAtCursor('![alt text](image-url)'); }

function insertCodeBlock() {
  const start = editor.selectionStart;
  const sel = editor.value.substring(start, editor.selectionEnd);
  const newText = sel ? `\n\`\`\`\n${sel}\n\`\`\`\n` : '\n```\ncode here\n```\n';
  insertAtCursor(newText);
}

function insertList() { insertAtCursor('\n- '); }
function insertOrderedList() { insertAtCursor('\n1. '); }
function insertHR() { insertAtCursor('\n---\n'); }

function insertBlockquote() {
  const start = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', start - 1) + 1;
  const before = editor.value.substring(0, lineStart);
  const after = editor.value.substring(lineStart);
  editor.value = before + '> ' + after;
  editor.selectionStart = editor.selectionEnd = start + 2;
  editor.focus();
  render();
}

function insertTable() {
  const text = `
| Column 1 | Column 2 | Column 3 |
|----------|----------|----------|
| Cell 1   | Cell 2   | Cell 3   |
| Cell 4   | Cell 5   | Cell 6   |
`.trim();
  insertAtCursor('\n' + text + '\n');
}

// NEW: Mermaid & Math
function insertMermaid() {
  const text = `
\`\`\`mermaid
graph TD
    A[开始] --> B{判断}
    B -->|是| C[执行A]
    B -->|否| D[执行B]
    C --> E[结束]
    D --> E
\`\`\`
`.trim();
  insertAtCursor('\n' + text + '\n');
}

function insertMath() {
  const text = `
\`\`\`math
E = mc^2
\`\`\`

行内公式: \`$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$\`
`.trim();
  insertAtCursor('\n' + text + '\n');
}

// ── Find & Replace ─────────────────────────────────────────────────────────
let findMatches = [];
let currentMatch = -1;

function toggleFindPanel() {
  const panel = document.getElementById('find-panel');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible')) {
    document.getElementById('find-input').focus();
  } else {
    clearHighlights();
  }
}

function findNext() {
  const query = document.getElementById('find-input').value;
  if (!query) return;
  
  if (findMatches.length === 0) {
    findAll(query);
  }
  
  if (findMatches.length > 0) {
    currentMatch = (currentMatch + 1) % findMatches.length;
    highlightCurrent();
  }
}

function findPrev() {
  const query = document.getElementById('find-input').value;
  if (!query) return;
  
  if (findMatches.length === 0) {
    findAll(query);
  }
  
  if (findMatches.length > 0) {
    currentMatch = (currentMatch - 1 + findMatches.length) % findMatches.length;
    highlightCurrent();
  }
}

function findAll(query) {
  const text = editor.value;
  findMatches = [];
  currentMatch = -1;
  
  let pos = 0;
  while ((pos = text.indexOf(query, pos)) !== -1) {
    findMatches.push({ start: pos, end: pos + query.length });
    pos += query.length;
  }
  
  document.getElementById('find-result').textContent = findMatches.length > 0 
    ? `${findMatches.length} 个匹配` 
    : '无匹配';
}

function highlightCurrent() {
  if (currentMatch < 0 || currentMatch >= findMatches.length) return;
  
  const match = findMatches[currentMatch];
  editor.focus();
  editor.selectionStart = match.start;
  editor.selectionEnd = match.end;
  
  document.getElementById('find-result').textContent = 
    `${currentMatch + 1}/${findMatches.length} 个匹配`;
}

function clearHighlights() {
  findMatches = [];
  currentMatch = -1;
}

function replaceOne() {
  const query = document.getElementById('find-input').value;
  const replacement = document.getElementById('replace-input').value;
  if (!query) return;
  
  if (findMatches.length === 0) {
    findAll(query);
  }
  
  if (findMatches.length > 0 && currentMatch >= 0) {
    const match = findMatches[currentMatch];
    editor.value = editor.value.substring(0, match.start) + replacement + editor.value.substring(match.end);
    render();
    
    // 重新查找
    findMatches = [];
    currentMatch = -1;
    findAll(query);
    if (findMatches.length > 0) {
      currentMatch = 0;
      highlightCurrent();
    }
  }
}

function replaceAll() {
  const query = document.getElementById('find-input').value;
  const replacement = document.getElementById('replace-input').value;
  if (!query) return;
  
  const count = (editor.value.match(new RegExp(escapeRegExp(query), 'g')) || []).length;
  editor.value = editor.value.split(query).join(replacement);
  render();
  
  document.getElementById('find-result').textContent = `已替换 ${count} 处`;
  findMatches = [];
  currentMatch = -1;
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

  showStatus('HTML exported!');
}

document.getElementById('theme-select').addEventListener('change', function() {
  document.documentElement.setAttribute('data-theme', this.value);
  localStorage.setItem('md-theme', this.value);
  // 更新 Mermaid 主题
  if (mermaidInitialized) {
    mermaid.initialize({ 
      startOnLoad: false, 
      theme: this.value === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose'
    });
    render();
  }
});

// Load saved theme
const savedTheme = localStorage.getItem('md-theme');
if (savedTheme) {
  document.getElementById('theme-select').value = savedTheme;
  document.documentElement.setAttribute('data-theme', savedTheme);
}

// ── Auto-save ───────────────────────────────────────────────────────────────
const LS_KEY = 'md-preview-content';
editor.value = localStorage.getItem(LS_KEY) || '';
render();

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    localStorage.setItem(LS_KEY, editor.value);
    showStatus('Auto-saved', 'saved');
  }, 2000);
}

// ── Drag & Drop file open ──────────────────────────────────────────────────
const dropOverlay = document.getElementById('drop-overlay');
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (e.relatedTarget === null) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', async e => {
  e.preventDefault();
  dropOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.md')) {
    const text = await file.text();
    editor.value = text;
    render();
    scheduleAutoSave();
    showStatus('Opened: ' + file.name);
  }
});

// ── Resize handle ──────────────────────────────────────────────────────────
const resizeHandle = document.getElementById('resize-handle');
let dragging = false;
resizeHandle.addEventListener('mousedown', () => { dragging = true; resizeHandle.classList.add('dragging'); document.body.style.cursor = 'col-resize'; });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const split = document.getElementById('split');
  const rect = split.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  const editorPane = document.getElementById('editor-pane');
  editorPane.style.flex = `0 0 ${Math.max(20, Math.min(80, pct))}%`;
});
document.addEventListener('mouseup', () => { dragging = false; resizeHandle.classList.remove('dragging'); document.body.style.cursor = ''; });

// 点击外部关闭模板菜单
document.addEventListener('click', e => {
  if (!e.target.closest('.template-dropdown')) {
    document.getElementById('template-menu').classList.remove('visible');
  }
});
